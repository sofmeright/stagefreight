version: 1

vars:
  org: prplanit
  github_org: prplanit
  repo: stagefreight

sources:
  primary:
    kind: git
    worktree: "."
    url: "https://github.com/{var:github_org}/{var:repo}"
    default_branch: "main"

policies:
  git_tags:
    stable: "^v?\\d+\\.\\d+\\.\\d+$"
    prerelease: "^v?\\d+\\.\\d+\\.\\d+-.+"
  branches:
    main: "^main$"

builds:
  - id: stagefreight
    kind: docker
    build_mode: crucible
    platforms: [linux/amd64]

targets:
  # ── Docker Hub: stable releases ─────────────────────────────────
  # Full rolling tag set. Renovate picks up {base} for auto-updates.
  # Only clean semver tags (no prerelease suffix).
  - id: dockerhub-stable
    kind: registry
    build: stagefreight
    url: docker.io
    provider: docker
    path: "{var:org}/{var:repo}"
    tags:
      - "v{version}"         # v0.2.0
      - "latest"
    when: { git_tags: [stable], events: [tag] }
    credentials: DOCKER

  # ── Docker Hub: pre-releases (alpha/beta/rc) ────────────────────
  # Version tag only — no rolling tags, no latest.
  - id: dockerhub-prerelease
    kind: registry
    build: stagefreight
    url: docker.io
    provider: docker
    path: "{var:org}/{var:repo}"
    tags:
      - "v{version}"         # v0.2.0-alpha.1
    when: { git_tags: [prerelease], events: [tag] }
    credentials: DOCKER

  # ── Docker Hub: dev builds on every commit ───────────────────────
  # Ephemeral builds for testing. No git tag required.
  # Retention keeps last 6 dev tags (sha-tagged only; latest-dev is protected).
  - id: dockerhub-dev
    kind: registry
    build: stagefreight
    url: docker.io
    provider: docker
    path: "{var:org}/{var:repo}"
    tags:
      - "dev-{sha:8}"        # dev-abc12345
      - "latest-dev"          # always points to newest dev build
    when: { branches: [main], events: [push] }
    credentials: DOCKER
    retention:
      keep_last: 6
      protect: ["latest-dev"]

  # ── Docker Hub: README sync ──────────────────────────────────────
  - id: dockerhub-readme
    kind: docker-readme
    url: docker.io
    path: "{var:org}/{var:repo}"
    credentials: DOCKER
    when: { branches: [main], events: [push, tag] }
    file: "README.md"
    description: "Declarative CI/CD CLI — detect, build, scan, and release container images from one manifest"
    link_base: "https://github.com/{var:github_org}/{var:repo}/blob/main"

  # ── GitLab component catalog ─────────────────────────────────────
  - id: gitlab-catalog
    kind: gitlab-component
    when: { branches: [main], events: [push] }
    spec_files: ["templates/stagefreight.yml"]
    catalog: true

  # ── Primary release (rolling git tag aliases) ────────────────────
  - id: primary-release
    kind: release
    aliases: ["v{version}", "latest"]
    when: { git_tags: [stable], events: [tag] }

narrator:
  - file: "README.md"
    link_base: "https://github.com/{var:github_org}/{var:repo}/blob/main"
    items:
      - id: badge.build
        kind: badge
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
        text: build
        value: "{env:BUILD_STATUS}"
        color: auto
        font: monofur
        output: ".stagefreight/badges/build.svg"
        link: "https://gitlab.prplanit.com/precisionplanit/{var:repo}/-/pipelines"

      - id: badge.license
        kind: badge
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
        text: license
        value: "AGPL-3.0-only"
        color: "#310937"
        font: monofur
        output: ".stagefreight/badges/license.svg"
        link: LICENSE

      - id: badge.release
        kind: badge
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
        text: release
        value: "v{base}"
        color: "#74ecbe"
        font: dejavu-sans
        font_size: 11
        output: ".stagefreight/badges/release.svg"
        link: "https://github.com/{var:github_org}/{var:repo}/releases"

      - id: badge.updated
        kind: badge
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
        text: updated
        value: "{env:BUILD_DATE}"
        color: "#236144"
        font: dejavu-sans
        font_size: 11
        output: ".stagefreight/badges/updated.svg"

      - id: shield.donate
        kind: shield
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
        shield: "badge/donate-FF5E5B?logo=ko-fi&logoColor=white"
        link: "https://ko-fi.com/T6T41IT163"

      - id: shield.sponsor
        kind: shield
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
        shield: "badge/sponsor-EA4AAA?logo=githubsponsors&logoColor=white"
        link: "https://github.com/sponsors/{var:github_org}"

      # ── Project section (repo health & sources) ─────────────────
      - id: project.github
        kind: shield
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        shield: "badge/GitHub-source-181717?logo=github"
        link: "https://github.com/{var:github_org}/{var:repo}"

      - id: project.gitlab
        kind: shield
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        shield: "badge/GitLab-source-FC6D26?logo=gitlab"
        link: "https://gitlab.prplanit.com/precisionplanit/{var:repo}"

      - id: project.go-report
        kind: props
        type: go-report-card
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        params:
          module: "github.com/{var:github_org}/{var:repo}"

      - id: project.go-reference
        kind: props
        type: go-reference
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        params:
          module: "github.com/{var:github_org}/{var:repo}"

      - id: project.last-commit
        kind: props
        type: github-last-commit
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        params:
          repo: "{var:github_org}/{var:repo}"

      - id: project.issues-open
        kind: props
        type: github-issues-open
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        params:
          repo: "{var:github_org}/{var:repo}"

      - id: project.prs-open
        kind: shield
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        shield: "github/issues-pr/{var:github_org}/{var:repo}"

      - id: project.contributors
        kind: props
        type: github-contributors
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        params:
          repo: "{var:github_org}/{var:repo}"

      # ── Image section (multi-row with breaks) ─────────────────────
      # Row 1: Docker image + pulls
      - id: image.docker
        kind: shield
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        shield: "badge/Docker-{var:org}%2F{var:repo}-2496ED?logo=docker&logoColor=white"
        link: "https://hub.docker.com/r/{var:org}/{var:repo}"

      - id: image.pulls
        kind: badge
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        text: pulls
        value: "{docker.pulls}"
        color: "#1d63ed"
        output: ".stagefreight/badges/pulls.svg"
        link: "https://hub.docker.com/r/{var:org}/{var:repo}"

      - id: image.break1
        kind: break
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace

      # Row 2: All tag badges (release + dev)
      - id: image.release-latest
        kind: badge
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        text: latest
        value: "v{version}"
        color: "#74ecbe"
        output: ".stagefreight/badges/latest.svg"
        link: "https://hub.docker.com/r/{var:org}/{var:repo}/tags?name=latest"

      - id: image.release-updated
        kind: badge
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        text: updated
        value: "{docker.tag.v{base}.updated}"
        color: "#236144"
        output: ".stagefreight/badges/release-updated.svg"

      - id: image.release-size
        kind: badge
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        text: size
        value: "{docker.tag.v{base}.size}"
        color: "#555"
        output: ".stagefreight/badges/release-size.svg"
        link: "https://hub.docker.com/r/{var:org}/{var:repo}/tags?name=v{base}"

      # Dev badges (same row)
      - id: image.dev-latest
        kind: badge
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        text: latest-dev
        value: "dev-{sha:8}"
        color: "#3b82f6"
        output: ".stagefreight/badges/latest-dev.svg"
        link: "https://hub.docker.com/r/{var:org}/{var:repo}/tags?name=latest-dev"

      - id: image.dev-updated
        kind: badge
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        text: updated
        value: "{docker.tag.latest-dev.updated}"
        color: "#236144"
        output: ".stagefreight/badges/dev-updated.svg"

      - id: image.dev-size
        kind: badge
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        text: size
        value: "{docker.tag.latest-dev.size}"
        color: "#555"
        output: ".stagefreight/badges/dev-size.svg"
        link: "https://hub.docker.com/r/{var:org}/{var:repo}/tags?name=latest-dev"

  - file: "docs/Component.md"
    items:
      - id: component-docs
        kind: component
        placement:
          between: ["<!-- sf:component:start -->", "<!-- sf:component:end -->"]
          mode: replace
        spec: "templates/stagefreight.yml"

  - file: "docs/reference/CLI.md"
    items:
      - id: cli-reference
        kind: include
        path: docs/modules/cli-reference.md
        placement:
          between: ["<!-- sf:cli-reference:start -->", "<!-- sf:cli-reference:end -->"]
          mode: replace

  - file: "docs/reference/Config.md"
    items:
      - id: config-reference
        kind: include
        path: docs/modules/config-reference.md
        placement:
          between: ["<!-- sf:config-reference:start -->", "<!-- sf:config-reference:end -->"]
          mode: replace

commit:
  default_type: docs
  conventional: true
  backend: git

lint:
  level: full
  exclude:
    - "*.ttf"
    - "*.png"
    - "*.jpg"
    - "*.ico"
    - "*.woff"
    - "*.woff2"
  modules:
    freshness:
      enabled: true
      options:
        cache_ttl: 300
        sources:
          docker_images: true
          docker_tools: true
          go_modules: true
        vulnerability:
          enabled: true
    tabs:
      enabled: true
    secrets:
      enabled: true
    conflicts:
      enabled: true
    filesize:
      enabled: true
    unicode:
      enabled: true
      options:
        # Unicode / invisible text defense — see docs/Linter.md § Unicode
        # No allowlist needed: banner art is build-generated with escaped
        # string literals (no raw control bytes in source).
        detect_bidi: true
        detect_zero_width: true
        detect_control_ascii: true

security:
  enabled: true
  sbom: true
  release_detail: full
