version: 1

vars:
  org: prplanit
  github_org: PrPlanIT
  gitlab_group: PrPlanIT
  repo: stagefreight
  github_repo: StageFreight

sources:
  primary:
    kind: git
    worktree: "."
    url: "https://gitlab.prplanit.com/{var:gitlab_group}/{var:repo}"
    default_branch: "main"
  mirrors:
    - id: github
      provider: github
      url: "https://github.com"
      project_id: "{var:github_org}/{var:github_repo}"
      credentials: GITHUB
      sync:
        git: true
        releases: true
  publish_origin:
    kind: mirror
    ref: github

policies:
  git_tags:
    stable: "^v?\\d+\\.\\d+\\.\\d+$"
    prerelease: "^v?\\d+\\.\\d+\\.\\d+-.+"
  branches:
    main: "^main$"

builds:
  - id: stagefreight
    kind: docker
    build_mode: crucible
    platforms: [linux/amd64]


build_cache:
  mode: hybrid
  external:
    target: harbor-dev
    path: "cache"
    fallback: "main"

targets:
  # ── Docker Hub: stable releases ─────────────────────────────────
  # Full rolling tag set. Renovate picks up {base} for auto-updates.
  # Only clean semver tags (no prerelease suffix).
  - id: dockerhub-stable
    kind: registry
    build: stagefreight
    url: docker.io
    provider: docker
    path: "{var:org}/{var:repo}"
    tags:
      - "v{version}"         # v0.2.0
      - "latest"
    when: { git_tags: [stable], events: [tag] }
    credentials: DOCKER

  # ── Docker Hub: pre-releases (alpha/beta/rc) ────────────────────
  # Version tag only — no rolling tags, no latest.
  - id: dockerhub-prerelease
    kind: registry
    build: stagefreight
    url: docker.io
    provider: docker
    path: "{var:org}/{var:repo}"
    tags:
      - "v{version}"         # v0.2.0-alpha.1
    when: { git_tags: [prerelease], events: [tag] }
    credentials: DOCKER

  # ── Docker Hub: dev builds on every commit ───────────────────────
  # Ephemeral builds for testing. No git tag required.
  # Retention keeps last 6 dev tags (sha-tagged only; latest-dev is protected).
  - id: dockerhub-dev
    kind: registry
    build: stagefreight
    url: docker.io
    provider: docker
    path: "{var:org}/{var:repo}"
    tags:
      - "dev-{sha:8}"        # dev-abc12345
      - "latest-dev"          # always points to newest dev build
    when: { branches: [main], events: [push] }
    credentials: DOCKER
    retention:
      keep_last: 6
      protect: ["latest-dev"]

  # ── Harbor: dev builds on every commit ──────────────────────────
  # Mirror of dockerhub-dev for local Harbor registry testing.
  - id: harbor-dev
    kind: registry
    build: stagefreight
    url: cr.pcfae.com
    provider: harbor
    path: "{var:org}/{var:repo}"
    tags:
      - "dev-{sha:8}"
      - "latest-dev"
    when: { branches: [main], events: [push] }
    credentials: HARBOR

  # ── Harbor: stable releases ─────────────────────────────────
  - id: harbor-stable
    kind: registry
    build: stagefreight
    url: cr.pcfae.com
    provider: harbor
    path: "{var:org}/{var:repo}"
    tags:
      - "v{version}"
      - "latest"
    when: { git_tags: [stable], events: [tag] }
    credentials: HARBOR

  # ── Docker Hub: README sync ──────────────────────────────────────
  - id: dockerhub-readme
    kind: docker-readme
    url: docker.io
    path: "{var:org}/{var:repo}"
    credentials: DOCKER
    when: { branches: [main], events: [push, tag] }
    file: "README.md"
    description: "A declarative lifecycle runtime — GitOps, Kubernetes, Docker, and CI ecosystems from one manifest"

  # ── GitLab component catalog ─────────────────────────────────────
  - id: gitlab-catalog
    kind: gitlab-component
    when: { branches: [main], events: [push] }
    spec_files: ["templates/stagefreight.yml"]
    catalog: true

  # ── Primary release (rolling git tag aliases) ────────────────────
  - id: primary-release
    kind: release
    aliases: ["v{version}", "latest"]
    when: { git_tags: [stable], events: [tag] }

badges:
  items:
    - id: build
      text: build
      value: "{env:BUILD_STATUS}"
      color: auto
      font: monofur
      output: ".stagefreight/badges/build.svg"
      link: "https://gitlab.prplanit.com/{var:gitlab_group}/{var:repo}/-/pipelines"
    - id: license
      text: license
      value: "AGPL-3.0-only"
      color: "#310937"
      font: monofur
      output: ".stagefreight/badges/license.svg"
      link: LICENSE
    - id: release
      text: release
      value: "v{base}"
      color: "#74ecbe"
      font: dejavu-sans
      font_size: 11
      output: ".stagefreight/badges/release.svg"
      link: "https://github.com/{var:github_org}/{var:github_repo}/releases"
    - id: updated
      text: updated
      value: "{env:BUILD_DATE}"
      color: "#236144"
      font: dejavu-sans
      font_size: 11
      output: ".stagefreight/badges/updated.svg"
    - id: pulls
      text: pulls
      value: "{docker.pulls}"
      color: "#1d63ed"
      output: ".stagefreight/badges/pulls.svg"
      link: "https://hub.docker.com/r/{var:org}/{var:repo}"
    - id: release-latest
      text: latest
      value: "v{base}"
      color: "#74ecbe"
      output: ".stagefreight/badges/latest.svg"
      link: "https://hub.docker.com/r/{var:org}/{var:repo}/tags?name=latest"
    - id: release-updated
      text: updated
      value: "{docker.tag.v{base}.updated}"
      color: "#236144"
      output: ".stagefreight/badges/release-updated.svg"
    - id: release-size
      text: size
      value: "{docker.tag.v{base}.size}"
      color: "#555"
      output: ".stagefreight/badges/release-size.svg"
      link: "https://hub.docker.com/r/{var:org}/{var:repo}/tags?name=v{base}"
    - id: dev-latest
      text: latest-dev
      value: "dev-{sha:8}"
      color: "#3b82f6"
      output: ".stagefreight/badges/latest-dev.svg"
      link: "https://hub.docker.com/r/{var:org}/{var:repo}/tags?name=latest-dev"
    - id: dev-updated
      text: updated
      value: "{docker.tag.latest-dev.updated}"
      color: "#236144"
      output: ".stagefreight/badges/dev-updated.svg"
    - id: dev-size
      text: size
      value: "{docker.tag.latest-dev.size}"
      color: "#555"
      output: ".stagefreight/badges/dev-size.svg"
      link: "https://hub.docker.com/r/{var:org}/{var:repo}/tags?name=latest-dev"

narrator:
  - file: "README.md"
    items:
      - id: badge.build
        kind: badge_ref
        ref: build
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true

      - id: badge.license
        kind: badge_ref
        ref: license
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true

      - id: badge.release
        kind: badge_ref
        ref: release
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true

      - id: badge.updated
        kind: badge_ref
        ref: updated
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true

      - id: shield.donate
        kind: shield
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
        shield: "badge/donate-FF5E5B?logo=ko-fi&logoColor=white"
        link: "https://ko-fi.com/T6T41IT163"

      - id: shield.sponsor
        kind: shield
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
        shield: "badge/sponsor-EA4AAA?logo=githubsponsors&logoColor=white"
        link: "https://github.com/sponsors/{var:github_org}"

      # ── Project section (repo health & sources) ─────────────────
      - id: project.github
        kind: shield
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        shield: "badge/GitHub-source-181717?logo=github"
        link: "https://github.com/{var:github_org}/{var:github_repo}"

      - id: project.gitlab
        kind: shield
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        shield: "badge/GitLab-source-FC6D26?logo=gitlab"
        link: "https://gitlab.prplanit.com/{var:gitlab_group}/{var:repo}"

      - id: project.go-report
        kind: props
        type: go-report-card
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        params:
          module: "github.com/{var:github_org}/{var:github_repo}"

      - id: project.go-reference
        kind: props
        type: go-reference
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        params:
          module: "github.com/{var:github_org}/{var:github_repo}"

      - id: project.last-commit
        kind: props
        type: github-last-commit
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        params:
          repo: "{var:github_org}/{var:github_repo}"

      - id: project.issues-open
        kind: props
        type: github-issues-open
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        params:
          repo: "{var:github_org}/{var:github_repo}"

      - id: project.prs-open
        kind: shield
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        shield: "github/issues-pr/{var:github_org}/{var:github_repo}"

      - id: project.contributors
        kind: props
        type: github-contributors
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        params:
          repo: "{var:github_org}/{var:github_repo}"

      # ── Image section (multi-row with breaks) ─────────────────────
      # Row 1: Docker image + pulls
      - id: image.docker
        kind: shield
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        shield: "badge/Docker-{var:org}%2F{var:repo}-2496ED?logo=docker&logoColor=white"
        link: "https://hub.docker.com/r/{var:org}/{var:repo}"

      - id: image.pulls
        kind: badge_ref
        ref: pulls
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace

      - id: image.break1
        kind: break
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace

      # Row 2: All tag badges (release + dev)
      - id: image.release-latest
        kind: badge_ref
        ref: release-latest
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace

      - id: image.release-updated
        kind: badge_ref
        ref: release-updated
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace

      - id: image.release-size
        kind: badge_ref
        ref: release-size
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace

      # Dev badges (same row)
      - id: image.dev-latest
        kind: badge_ref
        ref: dev-latest
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace

      - id: image.dev-updated
        kind: badge_ref
        ref: dev-updated
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace

      - id: image.dev-size
        kind: badge_ref
        ref: dev-size
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace

      # ── Image contents (from manifest inventory) ──────────────────
      - id: contents.base
        kind: build-contents
        section: inventories.versions
        renderer: badges
        placement:
          between: ["<!-- sf:contents-base:start -->", "<!-- sf:contents-base:end -->"]
          mode: replace

      - id: contents.apk
        kind: build-contents
        section: inventories.apk
        renderer: badges
        placement:
          between: ["<!-- sf:contents-apk:start -->", "<!-- sf:contents-apk:end -->"]
          mode: replace

  - file: "docs/Component.md"
    items:
      - id: component-docs
        kind: component
        placement:
          between: ["<!-- sf:component:start -->", "<!-- sf:component:end -->"]
          mode: replace
        spec: "templates/stagefreight.yml"

  - file: "docs/reference/CLI.md"
    items:
      - id: cli-reference
        kind: include
        path: docs/modules/cli-reference.md
        placement:
          between: ["<!-- sf:cli-reference:start -->", "<!-- sf:cli-reference:end -->"]
          mode: replace

  - file: "docs/reference/Config.md"
    items:
      - id: config-reference
        kind: include
        path: docs/modules/config-reference.md
        placement:
          between: ["<!-- sf:config-reference:start -->", "<!-- sf:config-reference:end -->"]
          mode: replace

commit:
  default_type: docs
  conventional: true
  backend: git

lint:
  level: full
  exclude:
    - "*.ttf"
    - "*.png"
    - "*.jpg"
    - "*.ico"
    - "*.woff"
    - "*.woff2"
  modules:
    freshness:
      enabled: true
      options:
        cache_ttl: 300
        sources:
          docker_images: true
          github_releases: true
          go_modules: true
        vulnerability:
          enabled: true
    tabs:
      enabled: true
    secrets:
      enabled: true
      exclude:
        - "go.sum"
    conflicts:
      enabled: true
    filesize:
      enabled: true
    unicode:
      enabled: true
      options:
        # Unicode / invisible text defense — see docs/Linter.md § Unicode
        # No allowlist needed: banner art is build-generated with escaped
        # string literals (no raw control bytes in source).
        detect_bidi: true
        detect_zero_width: true
        detect_control_ascii: true

security:
  enabled: true
  output: ".stagefreight/security"
  sbom: true
  release_detail: full

dependency:
  enabled: true
  output: ".stagefreight/deps"
  scope:
    go_modules: true
    dockerfile_env: true
  commit:
    enabled: true
    type: chore
    message: "update managed dependencies"
    push: true
    skip_ci: false

docs:
  enabled: true
  generators:
    badges: true
    reference_docs: true
    narrator: true
    docker_readme: true
  commit:
    enabled: true
    type: docs
    message: "refresh generated docs and badges"
    add:
      - "README.md"
      - "docs/modules"
      - "docs/reference"
      - "docs/Component.md"
      - ".stagefreight/badges"
    push: true
    skip_ci: false

release:
  enabled: true
  security_summary: ".stagefreight/security"
  registry_links: true
  catalog_links: true
