# StageFreight GitLab Runner — Persistent DinD
#
# Docker executor with a long-lived DinD daemon for BuildKit cache reuse.
# dind-storage volume persists Docker state (layers, images, cache) across
# pipeline runs. Per-job DinD services from the skeleton handle Docker
# access inside job containers via TLS shared certs at /certs/client.
#
# Registration uses --token (GitLab 16+). Tags, untagged, locked, etc.
# are managed in GitLab UI, not in registration flags.
#
# Required .env:
#   CI_SERVER_URL=https://gitlab.example.com/
#   RUNNER_TOKEN=glrt-...
#
# Optional .env:
#   RUNNER_NAME=MyRunner  (default: StageFreight Runner)

services:
  dind:
    image: docker:dind
    privileged: true
    restart: always
    environment:
      DOCKER_TLS_CERTDIR: /certs
      DOCKER_TLS_SAN: DNS:dind
    volumes:
      - dind-storage:/var/lib/docker
      - /opt/docker/gitlab-runner/certs:/certs
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  register-runner:
    image: gitlab/gitlab-runner:latest
    restart: "no"
    depends_on:
      dind:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ ! -f /etc/gitlab-runner/config.toml ]; then
          echo "Config does not exist, registering runner..."
          gitlab-runner register \
            --docker-dns=1.1.1.1 \
            --docker-dns=8.8.8.8 \
            --docker-host=tcp://dind:2376 \
            --docker-image=alpine:latest \
            --docker-privileged=true \
            --docker-volumes=/certs/client \
            --executor=docker \
            --name=$${RUNNER_NAME:-"StageFreight Runner"} \
            --non-interactive \
            --token=$${RUNNER_TOKEN} \
            --url=$${CI_SERVER_URL}
        else
          echo "Runner config already exists, skipping registration"
        fi
    environment:
      - CI_SERVER_URL=${CI_SERVER_URL}
      - RUNNER_TOKEN=${RUNNER_TOKEN}
      - DOCKER_TLS_VERIFY=1
      - DOCKER_CERT_PATH=/certs/client
    volumes:
      - /opt/docker/gitlab-runner/config:/etc/gitlab-runner:z
      - /opt/docker/gitlab-runner/certs:/certs:ro

  runner:
    image: gitlab/gitlab-runner:latest
    restart: always
    depends_on:
      dind:
        condition: service_healthy
    environment:
      - DOCKER_HOST=tcp://dind:2376
      - DOCKER_TLS_VERIFY=1
      - DOCKER_CERT_PATH=/certs/client
    volumes:
      - /opt/docker/gitlab-runner/config:/etc/gitlab-runner:z
      - /opt/docker/gitlab-runner/certs:/certs:ro

volumes:
  dind-storage:
