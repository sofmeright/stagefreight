# stagefreight-skeleton: lightweight
# provider: gitlab
# supports: validate, reconcile, docs
#
# Lightweight non-build transport. No DinD. For repos that don't build artifacts.
# Used by GitOps IaC repos, governance/policy repos, and docs-only repos.
# StageFreight decides what actually runs based on .stagefreight.yml config.

stages:
  - validate
  - reconcile
  - docs

workflow:
  auto_cancel:
    on_new_commit: interruptible

.stagefreight-context: &sf-context
  - export SF_CI_PROVIDER=gitlab
  - export SF_CI_EVENT="${CI_PIPELINE_SOURCE}"
  - export SF_CI_BRANCH="${CI_COMMIT_BRANCH}"
  - export SF_CI_TAG="${CI_COMMIT_TAG}"
  - export SF_CI_SHA="${CI_COMMIT_SHA}"
  - export SF_CI_DEFAULT_BRANCH="${CI_DEFAULT_BRANCH}"
  - export SF_CI_REPO_URL="${CI_PROJECT_URL}"
  - export SF_CI_WORKSPACE="$PWD"
  - export SF_CI_PIPELINE_ID="${CI_PIPELINE_ID}"

default:
  image: docker.cr.pcfae.com/prplanit/stagefreight:latest-dev
  interruptible: true

validate:
  stage: validate
  before_script:
    - *sf-context
  script:
    - stagefreight ci run validate
  allow_failure: true

reconcile:
  stage: reconcile
  variables:
    GIT_DEPTH: 0
  before_script:
    - *sf-context
  script:
    - stagefreight ci run reconcile
  allow_failure: true

generate-docs:
  stage: docs
  needs: [reconcile]
  variables:
    GIT_DEPTH: 0
    BUILD_DATE: "$CI_COMMIT_TIMESTAMP"
  before_script:
    - *sf-context
  script:
    - stagefreight ci run docs
  when: always
  allow_failure: true
