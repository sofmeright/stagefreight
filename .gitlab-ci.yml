# StageFreight GitLab CI skeleton
# Behavior is configured in .stagefreight.yml, not here.
# This file translates GitLab CI context into StageFreight's normalized contract.
# ALL jobs always exist. StageFreight decides if they do work at runtime.

stages:
  - deps
  - build
  - security
  - release
  - docs

workflow:
  auto_cancel:
    on_new_commit: interruptible

.stagefreight-context: &sf-context
  - export SF_CI_PROVIDER=gitlab
  - export SF_CI_EVENT="${CI_PIPELINE_SOURCE}"
  - export SF_CI_BRANCH="${CI_COMMIT_BRANCH}"
  - export SF_CI_TAG="${CI_COMMIT_TAG}"
  - export SF_CI_SHA="${CI_COMMIT_SHA}"
  - export SF_CI_DEFAULT_BRANCH="${CI_DEFAULT_BRANCH}"
  - export SF_CI_REPO_URL="${CI_PROJECT_URL}"
  - export SF_CI_WORKSPACE="$PWD"
  - export SF_CI_PIPELINE_ID="${CI_PIPELINE_ID}"

.dind-setup: &dind-setup
  - docker context create tls-context --docker "host=$DOCKER_HOST,ca=$DOCKER_CERT_PATH/ca.pem,cert=$DOCKER_CERT_PATH/cert.pem,key=$DOCKER_CERT_PATH/key.pem" 2>/dev/null || true
  - |
    if docker buildx inspect sf-builder >/dev/null 2>&1; then
      mkdir -p .stagefreight/runtime/docker && printf '{"name":"sf-builder","action":"reused","driver":"docker-container","endpoint":"tls-context"}\n' > .stagefreight/runtime/docker/builder.json
    else
      docker buildx create --name sf-builder --driver docker-container --use tls-context
      mkdir -p .stagefreight/runtime/docker && printf '{"name":"sf-builder","action":"created","driver":"docker-container","endpoint":"tls-context"}\n' > .stagefreight/runtime/docker/builder.json
    fi
  - docker buildx use sf-builder

.dind-variables: &dind-variables
  DOCKER_HOST: "tcp://docker:2376"
  DOCKER_TLS_VERIFY: "1"
  DOCKER_CERT_PATH: "/certs/client"
  DOCKER_TLS_CERTDIR: "/certs"

default:
  image: docker.cr.pcfae.com/prplanit/stagefreight:latest-dev
  interruptible: true
  services:
    - name: docker.cr.pcfae.com/docker:27-dind
      alias: docker

dependency-update:
  stage: deps
  variables:
    GIT_DEPTH: 0
    <<: *dind-variables
  before_script:
    - *sf-context
    - *dind-setup
  script:
    - stagefreight ci run deps
  artifacts:
    paths: [.stagefreight/deps/]
    expire_in: 1 week
  allow_failure: true

build:
  stage: build
  variables:
    <<: *dind-variables
  before_script:
    - *sf-context
    - *dind-setup
  script:
    - stagefreight ci run build
  artifacts:
    paths: [.stagefreight/]
    reports:
      junit: .stagefreight/reports/lint.xml
    expire_in: 2 hours

security-scan:
  stage: security
  needs: [build]
  variables:
    <<: *dind-variables
  before_script:
    - *sf-context
    - *dind-setup
  script:
    - stagefreight ci run security
  artifacts:
    paths: [.stagefreight/security/]
    expire_in: 1 week
  allow_failure: true

create-release:
  stage: release
  needs:
    - build
    - security-scan
  variables:
    GIT_DEPTH: 0
  before_script:
    - *sf-context
  script:
    - stagefreight ci run release
  allow_failure: true

generate-docs:
  stage: docs
  needs:
    - build
    - create-release
  variables:
    GIT_DEPTH: 0
    BUILD_STATUS: "passing"
    BUILD_DATE: "$CI_COMMIT_TIMESTAMP"
  before_script:
    - *sf-context
  script:
    - stagefreight ci run docs
  when: always
  allow_failure: true
